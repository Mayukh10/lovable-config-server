server:
  port: 9053

spring:
  datasource:
    url: jdbc:postgresql://localhost:9010/lovable-workspace-db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: projects

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
